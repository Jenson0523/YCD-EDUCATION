server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: ycd-api
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ycd_education?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 文件上传配置
app:
  upload:
    dir: ./uploads

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

knife4j:
  enable: true

# 人脸识别配置
#   provider=arcsoft : 优先用虹软离线SDK（需安装SDK+填app-id/sdk-key，见 docs/ARCSOFT_SETUP.md）
#                      未安装时自动回退到"图像相似度过渡引擎"（真实图像比对，杜绝随机照片误判）
#   threshold        : 真实人脸引擎(ArcSoft)通过阈值（同一人置信度，建议80）
#   fallback-threshold: 过渡图像引擎通过阈值（更严格，建议85，降低误判）
face:
  api:
    provider: arcsoft
    threshold: 80.0
    fallback-threshold: 85.0
    arcsoft:
      app-id: ${ARCSOFT_APP_ID:}
      sdk-key: ${ARCSOFT_SDK_KEY:}
      lib-path: ${ARCSOFT_LIB_PATH:./libs/arcsoft}
