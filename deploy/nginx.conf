# ═══════════════════════════════════════════════════════════
# 云辰盾 Nginx 站点配置
# 放到 /etc/nginx/conf.d/ycd.conf，改两处 ★ 后 nginx -s reload
# 架构：Nginx(80/443) ─┬─ /api/** → Spring Boot :8081
#                      └─ 其余    → PC后台静态文件(dist)
# 小程序与PC共用同一 https 域名（微信要求 https + ICP备案域名）
# ═══════════════════════════════════════════════════════════

server {
    listen 80;
    server_name ycd.example.com;            # ★ 改：你的域名
    # HTTP 全部跳转 HTTPS（证书配好后取消注释下一行，并注释掉下面 location 块）
    # return 301 https://$host$request_uri;

    # —— 证书未就绪前可先用 80 端口联调（小程序正式发布必须 https）——
    include /etc/nginx/conf.d/ycd-common.inc;
}

server {
    listen 443 ssl http2;
    server_name ycd.example.com;            # ★ 改：你的域名

    # ★ 改：证书路径（certbot 或云厂商签发）
    ssl_certificate     /etc/nginx/ssl/ycd.example.com.pem;
    ssl_certificate_key /etc/nginx/ssl/ycd.example.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    include /etc/nginx/conf.d/ycd-common.inc;
}
